# Kflow task defaults for the BET 2026 single-area model runner.
#
# This file describes how Kflow should run the repo. Most model-specific edits
# belong in job-config.R; this file is for Docker, resources, default env,
# saved outputs, and automatic follow-up tasks.

# Stable task id shown in Kflow and used by the API:
#   /api/job/ofp-sam-bet-yft-2026-single-area
name: ofp-sam-bet-yft-2026-single-area
description: Run the fitted BET and YFT 2026 single-area MFCL models.

# Command executed inside the Docker container after checkout.
command: bash run.sh

# Use the tagged tuna-flow image so local/Kflow runs do not drift unexpectedly.
# Change deliberately, for example:
#   ghcr.io/pacificcommunity/tuna-flow:v2.4
#   ghcr.io/pacificcommunity/tuna-flow:latest
docker_image: ghcr.io/pacificcommunity/tuna-flow:v2.4

# HTCondor resource request. Increase memory/disk before increasing CPUs unless
# the MFCL command itself can use more threads.
resources:
  cpus: 2
  memory: 8GB
  disk: 10GB

# Default is intentionally empty. Add machines only for a temporary launch or
# let Kflow's scheduler-health auto-exclude handle currently bad nodes.
exclude_machines: []
exclude_slots: []

env:
  # Default selected model folder. Override per job in the Kflow job config.
  # This repo has one model, so `all` and `BET` are equivalent.
  STEP_SELECT: all

  # Default Kflow display labels for the default model. `make kflow` computes
  # these from job-config.R. When launching directly from the Kflow UI and
  # changing STEP_SELECT, update these fields too if the job list should show
  # the selected model label before the run starts.
  JOB_TITLE: "BET and YFT 2026 single-area fitted models"
  JOB_DESCRIPTION: "Run fitted BET and YFT single-area parameter snapshots once and build model outputs."
  MODEL_LABEL: "BET and YFT 2026 single-area fitted models"
  JOB_KEY: 01-single-area-bet2026-full-fit
  FLOW_GROUP: bet-yft-2026-single-area
  FLOW_SPECIES: BET
  FLOW_SPECIES_LABEL: bigeye tuna
  FLOW_ASSESSMENT_YEAR: "2026"
  PLOT_TITLE: BET 2026 single-area report-ready figures
  PLOT_MAX_FISHERIES: "29"
  REPORT_QMD: assessment-report.qmd
  REPORT_FILE_STEM: bet-yft-2026-single-area
  STEPWISE_BUILD_PAYLOAD: "true"
  STEPWISE_SAVE_RAW_MFCL_INPUTS: "true"
  RUN_MODE: single_par
  INPUT_PAR: "final.par"
  PAR_SOURCE_JOB: ""
  STEPWISE_PAR_SOURCE_DIR: ""
  KFLOW_INPUT_JOBS: ""
  STEPWISE_BASE_INPUT_JOB: ""
  STEPWISE_CHECK_INPUT_JOBS: ""
  ATTACH_CHECK_TYPES: ""
  FRQ: bet.frq
  OUTPUT_PAR: ""
  STEPWISE_SAVE_FINAL_PAR: "false"
  STEPWISE_COMMIT_FINAL_PARS: "false"
  STEPWISE_PUSH_FINAL_PARS: "false"
  STEPWISE_PUBLISH_REQUIRED: "false"
  # true streams the full MFCL output to Kflow logs. false keeps logs quieter.
  MFCL_LIVE_LOG: "true"

  # The archived doitall's final phase uses -4. Override only for an explicit
  # convergence sensitivity.
  BET_FINAL_CONVERGENCE: "-4"
  BET_PHASE10_11_CONVERGENCE: "-4"

  # Private helper packages are updated at runtime so the public image stays stable.
  KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
  KFLOW_RUNTIME_UPDATE: always
  TUNA_FLOW_RUNTIME_UPDATE: always
  KFLOW_REPO_RUNTIME_UPDATE: always
  KFLOW_RUNTIME_PACKAGES: none
  KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@a093e40c0da6984e6f1c3d901e02846a5ee157f1,mfclshiny=PacificCommunity/mfclshiny@90acece572b41061cf3756bf2b2596eb2f1a43fa
  MFCLSHINY_GITHUB_REF: 90acece572b41061cf3756bf2b2596eb2f1a43fa
  KFLOW_RUNTIME_GITHUB_AUTH: "true"
  KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
  KFLOW_REPORT_COMMIT_GENERATED: "true"
  KFLOW_REPORT_PUSH_GENERATED: "true"
  KFLOW_REPORT_PUBLISH_REQUIRED: "true"

# Keep artifacts compact. The runner writes only model_payload.rds, final .par,
# generated MFCL reports/fits needed by the payload, and small index CSVs under outputs/.
output_patterns:
  - outputs/**

local_apps:
  - key: mfclshiny
    label: MFCL Shiny
    icon: chart-no-axes-combined
    runner: local-docker-ssh
    memory: 8g
    archive_sources:
      - outputs
    container_port: 3838
    env:
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      VECLIB_MAXIMUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      R_REMOTES_NO_ERRORS_FROM_WARNINGS: "true"
      KFLOW_LOCAL_APP_PACKAGE_UPDATE: "auto"
      MFCLKIT_GITHUB_REF: a093e40c0da6984e6f1c3d901e02846a5ee157f1
      MFCLSHINY_GITHUB_REF: 90acece572b41061cf3756bf2b2596eb2f1a43fa
      MFCLSHINY_AUTO_LOAD: "true"
      MFCLSHINY_INITIAL_RENDER: "false"
      MFCLSHINY_LIVE_UPDATE: "false"
      MFCLSHINY_REPORT_DPI: "96"
      MFCLSHINY_OPTIMIZE_FIGURES: "true"
      MFCLSHINY_PREVIEW_DPI: "48"
      MFCLSHINY_PREVIEW_MAX_WIDTH: "980"
      MFCLSHINY_PREVIEW_MAX_HEIGHT: "980"
      MFCLSHINY_REPORT_CARD_LIMIT: "60"
    command: |
      Rscript - <<'RS'
      Sys.setenv(
        OMP_NUM_THREADS = "1",
        OPENBLAS_NUM_THREADS = "1",
        MKL_NUM_THREADS = "1",
        VECLIB_MAXIMUM_THREADS = "1",
        NUMEXPR_NUM_THREADS = "1",
        MFCLSHINY_MODEL_DIR = Sys.getenv("KFLOW_LOCAL_APP_INPUT_DIR", "/kflow/inputs"),
        MFCLSHINY_EXPORT_DIR = "/kflow/work/export",
        R_REMOTES_NO_ERRORS_FROM_WARNINGS = "true"
      )
      options(
        bitmapType = "cairo",
        Ncpus = max(1L, parallel::detectCores() - 2L)
      )

      lib <- Sys.getenv("KFLOW_LOCAL_APP_R_LIBS", "/kflow/package-cache/R-library")
      dir.create(lib, recursive = TRUE, showWarnings = FALSE)
      base_libs <- setdiff(.libPaths(), normalizePath(lib, winslash = "/", mustWork = FALSE))
      .libPaths(unique(c(lib, base_libs)))

      ensure_cran_packages <- function(packages) {
        packages <- unique(packages[nzchar(packages)])
        missing <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]
        if (!length(missing)) {
          return(invisible(TRUE))
        }
        repos <- getOption("repos")
        if (is.null(repos) || identical(unname(repos[["CRAN"]]), "@CRAN@")) {
          repos <- c(CRAN = Sys.getenv("CRAN_REPO", "https://cloud.r-project.org"))
        }
        message("[mfclshiny-local-app] installing missing CRAN packages: ", paste(missing, collapse = ", "))
        utils::install.packages(
          missing,
          lib = lib,
          repos = repos,
          dependencies = c("Depends", "Imports", "LinkingTo"),
          Ncpus = getOption("Ncpus", 1L)
        )
        missing <- packages[!vapply(packages, requireNamespace, logical(1), quietly = TRUE)]
        if (length(missing)) {
          stop(
            "Missing R package(s) after local-app dependency install: ",
            paste(missing, collapse = ", "),
            call. = FALSE
          )
        }
        invisible(TRUE)
      }
      ensure_cran_packages(c(
        "cowplot", "dplyr", "DT", "ggplot2", "htmltools", "jsonlite",
        "maps", "patchwork", "plotly", "purrr", "rlang", "rpart",
        "remotes",
        "scales", "shiny", "shinydashboard", "shinyFiles", "shinyWidgets",
        "stringr", "tibble", "tidyr", "viridis"
      ))

      ensure_pinned_github_package <- function(package, repo, ref) {
        desc_field <- function(desc, name) {
          value <- tryCatch(desc[[name]], error = function(e) "")
          if (is.null(value) || !length(value) || is.na(value[[1L]])) "" else as.character(value[[1L]])
        }
        installed_desc <- tryCatch(
          suppressWarnings(utils::packageDescription(package, lib.loc = lib)),
          error = function(e) NULL
        )
        if (length(installed_desc) == 1L && is.na(installed_desc[[1L]])) {
          installed_desc <- NULL
        }
        installed_sha <- desc_field(installed_desc, "RemoteSha")
        ref_is_sha <- grepl("^[0-9a-f]{7,40}$", ref, ignore.case = TRUE)
        if (!isTRUE(ref_is_sha)) {
          stop("Pinned local-app package ref must be a commit SHA: ", package, "@", ref, call. = FALSE)
        }
        if (!is.null(installed_desc) && nzchar(installed_sha) &&
            startsWith(tolower(installed_sha), tolower(ref)) &&
            requireNamespace(package, quietly = TRUE)) {
          return(invisible(TRUE))
        }
        token <- Sys.getenv("GITHUB_PAT", Sys.getenv("GITHUB_TOKEN", ""))
        if (!nzchar(token)) {
          stop(package, " cache does not match its pinned ref and no GitHub token was forwarded.", call. = FALSE)
        }
        remotes::install_github(
          repo,
          ref = ref,
          auth_token = token,
          lib = lib,
          dependencies = FALSE,
          upgrade = "never",
          force = TRUE,
          quiet = TRUE
        )
        installed_desc <- tryCatch(
          suppressWarnings(utils::packageDescription(package, lib.loc = lib)),
          error = function(e) NULL
        )
        installed_sha <- desc_field(installed_desc, "RemoteSha")
        if (is.null(installed_desc) || !nzchar(installed_sha) ||
            !startsWith(tolower(installed_sha), tolower(ref))) {
          stop(package, " does not match its pinned local-app ref: ", ref, call. = FALSE)
        }
        invisible(TRUE)
      }
      ensure_pinned_github_package(
        "mfclkit",
        "PacificCommunity/ofp-sam-mfclkit",
        Sys.getenv("MFCLKIT_GITHUB_REF", "main")
      )

      mfclshiny_ref <- Sys.getenv("MFCLSHINY_GITHUB_REF", "main")
      desc_field <- function(desc, name) {
        value <- tryCatch(desc[[name]], error = function(e) "")
        if (is.null(value) || !length(value) || is.na(value[[1L]])) "" else as.character(value[[1L]])
      }
      installed_desc <- tryCatch(
        suppressWarnings(utils::packageDescription("mfclshiny")),
        error = function(e) NULL
      )
      if (length(installed_desc) == 1L && is.na(installed_desc[[1L]])) {
        installed_desc <- NULL
      }
      installed_sha <- desc_field(installed_desc, "RemoteSha")
      installed_ref <- desc_field(installed_desc, "RemoteRef")
      ref_is_sha <- grepl("^[0-9a-f]{7,40}$", mfclshiny_ref, ignore.case = TRUE)
      token <- Sys.getenv("GITHUB_PAT", Sys.getenv("GITHUB_TOKEN", ""))
      git <- Sys.which("git")
      git_url <- "https://github.com/PacificCommunity/mfclshiny.git"
      resolve_remote_sha <- function(ref) {
        if (!nzchar(git) || !nzchar(ref) || isTRUE(ref_is_sha)) {
          return(if (isTRUE(ref_is_sha)) ref else "")
        }
        askpass <- tempfile(pattern = "mfclshiny-lsremote-askpass-")
        on.exit(unlink(askpass, recursive = TRUE, force = TRUE), add = TRUE)
        writeLines(c(
          "#!/bin/sh",
          "case \"$1\" in",
          "  *Username*) printf '%s\\n' x-access-token ;;",
          "  *) printf '%s\\n' \"$KFLOW_GIT_ASKPASS_TOKEN\" ;;",
          "esac"
        ), askpass)
        Sys.chmod(askpass, mode = "0700")
        out <- tryCatch(
          system2(
            git,
            c("ls-remote", git_url, ref, paste0("refs/heads/", ref), paste0("refs/tags/", ref)),
            env = c(
              paste0("GIT_ASKPASS=", askpass),
              "GIT_TERMINAL_PROMPT=0",
              paste0("KFLOW_GIT_ASKPASS_TOKEN=", token)
            ),
            stdout = TRUE,
            stderr = FALSE
          ),
          error = function(e) character()
        )
        sha_lines <- out[grepl("^[0-9a-fA-F]{40}[[:space:]]", out)]
        sha <- if (length(sha_lines)) sub("[[:space:]].*$", "", sha_lines[[1L]]) else ""
        if (nzchar(sha)) sha else ""
      }
      desired_sha <- resolve_remote_sha(mfclshiny_ref)
      ref_matches <- if (isTRUE(ref_is_sha)) {
        nzchar(installed_sha) && startsWith(tolower(installed_sha), tolower(mfclshiny_ref))
      } else {
        identical(installed_ref, mfclshiny_ref) &&
          nzchar(installed_sha) &&
          nzchar(desired_sha) &&
          startsWith(tolower(installed_sha), tolower(desired_sha))
      }
      if (is.null(installed_desc) || !isTRUE(ref_matches)) {
        if (!nzchar(token)) {
          stop("mfclshiny cache does not match MFCLSHINY_GITHUB_REF and no GitHub token was forwarded.", call. = FALSE)
        }
        if (!nzchar(git)) {
          stop("git is required to install mfclshiny for the local app.", call. = FALSE)
        }
        source_dir <- tempfile(pattern = "mfclshiny-src-")
        askpass <- tempfile(pattern = "mfclshiny-askpass-")
        writeLines(c(
          "#!/bin/sh",
          "case \"$1\" in",
          "  *Username*) printf '%s\\n' x-access-token ;;",
          "  *) printf '%s\\n' \"$KFLOW_GIT_ASKPASS_TOKEN\" ;;",
          "esac"
        ), askpass)
        Sys.chmod(askpass, mode = "0700")
        run_git <- function(args) {
          status <- system2(
            git,
            args,
            env = c(
              paste0("GIT_ASKPASS=", askpass),
              "GIT_TERMINAL_PROMPT=0",
              paste0("KFLOW_GIT_ASKPASS_TOKEN=", token)
            ),
            stdout = FALSE,
            stderr = FALSE
          )
          identical(as.integer(status), 0L)
        }
        git_url <- "https://github.com/PacificCommunity/mfclshiny.git"
        if (!run_git(c("clone", "--quiet", "--depth", "50", git_url, source_dir))) {
          stop("git clone failed for PacificCommunity/mfclshiny.", call. = FALSE)
        }
        if (!run_git(c("-C", source_dir, "checkout", "--quiet", mfclshiny_ref))) {
          if (!run_git(c("-C", source_dir, "fetch", "--quiet", "--depth", "1", "origin", mfclshiny_ref)) ||
              !run_git(c("-C", source_dir, "checkout", "--quiet", "FETCH_HEAD"))) {
            stop("git checkout failed for PacificCommunity/mfclshiny@", mfclshiny_ref, call. = FALSE)
          }
        }
        install_output <- system2(
          file.path(R.home("bin"), "R"),
          c("CMD", "INSTALL", "-l", lib, source_dir),
          stdout = TRUE,
          stderr = TRUE
        )
        install_status <- attr(install_output, "status")
        if (is.null(install_status)) install_status <- 0L
        unlink(c(source_dir, askpass), recursive = TRUE, force = TRUE)
        if (!identical(as.integer(install_status), 0L)) {
          detail <- paste(tail(as.character(install_output), 30), collapse = "\n")
          stop("R CMD INSTALL failed for mfclshiny\n", detail, call. = FALSE)
        }
        desc_path <- system.file("DESCRIPTION", package = "mfclshiny", lib.loc = lib)
        if (nzchar(desc_path) && file.exists(desc_path)) {
          remote <- list(
            RemoteType = "github",
            RemoteHost = "api.github.com",
            RemoteUsername = "PacificCommunity",
            RemoteRepo = "mfclshiny",
            RemoteRef = mfclshiny_ref,
            RemoteSha = if (nzchar(desired_sha)) desired_sha else mfclshiny_ref
          )
          fields <- as.list(read.dcf(desc_path)[1, ])
          fields[names(remote)] <- remote
          write.dcf(as.data.frame(fields, stringsAsFactors = FALSE, check.names = FALSE), desc_path)
          meta_path <- system.file("Meta", "package.rds", package = "mfclshiny", lib.loc = lib)
          if (file.exists(meta_path)) {
            meta <- readRDS(meta_path)
            meta[["DESCRIPTION"]][names(remote)] <- unlist(remote)
            saveRDS(meta, meta_path)
          }
          }
          installed_desc <- tryCatch(
            suppressWarnings(utils::packageDescription("mfclshiny", lib.loc = lib)),
            error = function(e) NULL
          )
          installed_sha <- desc_field(installed_desc, "RemoteSha")
          installed_ref <- desc_field(installed_desc, "RemoteRef")
          ref_matches <- if (isTRUE(ref_is_sha)) {
            nzchar(installed_sha) && startsWith(tolower(installed_sha), tolower(mfclshiny_ref))
          } else {
            identical(installed_ref, mfclshiny_ref) &&
              nzchar(installed_sha) &&
              nzchar(desired_sha) &&
              startsWith(tolower(installed_sha), tolower(desired_sha))
          }
        }
      if (is.null(installed_desc) || !isTRUE(ref_matches)) {
        stop("mfclshiny does not match MFCLSHINY_GITHUB_REF: ", mfclshiny_ref, call. = FALSE)
      }

      dir.create("/kflow/work/export", recursive = TRUE, showWarnings = FALSE)
      has_model_children <- function(path) {
        if (!dir.exists(path)) return(FALSE)
        children <- list.dirs(path, full.names = TRUE, recursive = FALSE)
        any(file.exists(file.path(children, "model_payload.rds")))
      }
      has_models_dir <- function(path) {
        has_model_children(file.path(path, "models"))
      }
      output_root_score <- function(path) {
        if (!dir.exists(path)) return("")
        score <- 0L
        if (has_models_dir(path)) score <- score + 100L
        if (has_model_children(path)) score <- score + 50L
        if (file.exists(file.path(path, "model-index.csv"))) score <- score + 25L
        if (dir.exists(file.path(path, "region-map"))) score <- score + 25L
        if (!score) return("")
        sprintf("%06d:%s", score, normalizePath(path, winslash = "/", mustWork = FALSE))
      }
      discover_output_root <- function(...) {
        roots <- unique(normalizePath(
          c(...),
          winslash = "/",
          mustWork = FALSE
        ))
        roots <- roots[dir.exists(roots)]
        candidates <- unique(unlist(lapply(roots, function(root) {
          child_outputs <- file.path(list.dirs(root, full.names = TRUE, recursive = FALSE), "outputs")
          c(root, file.path(root, "outputs"), file.path(root, "inputs"), child_outputs)
        }), use.names = FALSE))
        for (root in roots) {
          payloads <- list.files(
            root,
            pattern = "^model_payload[.]rds$",
            recursive = TRUE,
            full.names = TRUE
          )
          if (length(payloads)) {
            model_dirs <- unique(dirname(payloads))
            models_roots <- unique(dirname(model_dirs))
            candidates <- c(candidates, models_roots, dirname(models_roots))
          }
        }
        candidates <- unique(normalizePath(candidates, winslash = "/", mustWork = FALSE))
        scores <- vapply(candidates, output_root_score, character(1))
        scores <- scores[nzchar(scores)]
        if (length(scores)) {
          return(sub("^[0-9]+:", "", sort(scores, decreasing = TRUE)[[1]]))
        }
        roots[[1]]
      }
      link_or_copy <- function(from, to) {
        unlink(to, recursive = TRUE, force = TRUE)
        ok <- tryCatch(file.symlink(from, to), warning = function(w) FALSE, error = function(e) FALSE)
        if (!isTRUE(ok)) {
          ok <- file.copy(from, dirname(to), recursive = TRUE, overwrite = TRUE, copy.date = TRUE)
        }
        if (!isTRUE(ok)) stop("Failed to stage local app input: ", from, call. = FALSE)
        invisible(to)
      }
      path_parts <- function(path) strsplit(normalizePath(path, winslash = "/", mustWork = FALSE), "/", fixed = TRUE)[[1L]]
      path_from_parts <- function(parts) {
        parts <- as.character(parts)
        if (!length(parts)) return("")
        if (identical(parts[[1L]], "")) paste0("/", paste(parts[-1L], collapse = "/")) else do.call(file.path, as.list(parts))
      }
      diagnostic_leaf_name <- function(folder) {
        name <- basename(normalizePath(folder, winslash = "/", mustWork = FALSE))
        name %in% c("jitter", "retro", "aspm", "hessian", "profile", "selftest", "projection",
                    "refit", "sim", "truth", "truth_eval", "inputs", "recovery") ||
          grepl("^(rep|replicate|peel|part|jitter[_-]?seed|seed|scalar|scaler|sc)[_-]?[-+]?[0-9.]+$", name, ignore.case = TRUE)
      }
      diagnostic_anchor <- function(folder) {
        parts <- path_parts(folder)
        n <- length(parts)
        if (n < 2L) return(NA_integer_)
        seed_dir <- "^(jitter[_-]?seed|seed)[_-]?[0-9]+$"
        peel_dir <- "^peel[_-]?[0-9]+$"
        part_dir <- "^part[_-]?[0-9]+$"
        scalar_dir <- "^(scalar|scaler|sc)[_-]?[-+]?[0-9.]+$"
        selftest_dir <- "^(rep|replicate)[_-]?[0-9]+$"
        for (i in seq_len(n - 1L)) {
          current <- parts[[i]]
          next_part <- parts[[i + 1L]]
          if (identical(current, "jitter") && grepl(seed_dir, next_part, ignore.case = TRUE)) return(i)
          if (identical(current, "retro") && grepl(peel_dir, next_part, ignore.case = TRUE)) return(i)
          if (identical(current, "hessian") && grepl(part_dir, next_part, ignore.case = TRUE)) return(i)
          if (identical(current, "profile") && i + 2L <= n && grepl(scalar_dir, parts[[i + 2L]], ignore.case = TRUE)) return(i)
          if (identical(current, "selftest") &&
              (next_part %in% c("refit", "sim", "truth", "truth_eval", "inputs", "recovery") ||
                 grepl(selftest_dir, next_part, ignore.case = TRUE))) return(i)
        }
        NA_integer_
      }
      parent_model_dir <- function(folder) {
        anchor <- diagnostic_anchor(folder)
        if (!is.finite(anchor) || anchor <= 1L) return(normalizePath(folder, winslash = "/", mustWork = FALSE))
        normalizePath(path_from_parts(path_parts(folder)[seq_len(anchor - 1L)]), winslash = "/", mustWork = FALSE)
      }
      canonical_model_dir <- function(folder) {
        folder <- normalizePath(folder, winslash = "/", mustWork = FALSE)
        if (diagnostic_leaf_name(folder)) return(NA_character_)
        parent <- parent_model_dir(folder)
        if (!identical(parent, folder)) return(parent)
        if (basename(folder) %in% c("jitter", "retro", "aspm", "hessian", "profile", "selftest", "projection") &&
              file.exists(file.path(dirname(folder), "model_payload.rds"))) {
          return(normalizePath(dirname(folder), winslash = "/", mustWork = FALSE))
        }
        folder
      }
      topmost_model_dirs <- function(paths) {
        paths <- unique(vapply(paths, canonical_model_dir, character(1L), USE.NAMES = FALSE))
        paths <- paths[!is.na(paths) & nzchar(paths)]
        paths <- normalizePath(paths, winslash = "/", mustWork = FALSE)
        paths <- paths[file.exists(file.path(paths, "model_payload.rds"))]
        if (!length(paths)) return(paths)
        keep <- vapply(paths, function(path) {
          !any(vapply(setdiff(paths, path), function(parent) startsWith(path, paste0(parent, "/")), logical(1L)))
        }, logical(1L))
        paths[keep]
      }
      discover_model_dirs <- function(output_root) {
        roots <- unique(normalizePath(
          c(output_root, file.path(output_root, "models")),
          winslash = "/",
          mustWork = FALSE
        ))
        roots <- roots[dir.exists(roots)]
        direct <- unique(unlist(lapply(roots, function(root) {
          children <- list.dirs(root, full.names = TRUE, recursive = FALSE)
          children[file.exists(file.path(children, "model_payload.rds"))]
        }), use.names = FALSE))
        direct <- topmost_model_dirs(direct)
        if (length(direct)) return(direct)

        payload_dirs <- unique(unlist(lapply(roots, function(root) {
          dirs <- dirname(list.files(
            root,
            pattern = "^model_payload[.]rds$",
            recursive = TRUE,
            full.names = TRUE
          ))
          if (file.exists(file.path(root, "model_payload.rds"))) dirs <- c(root, dirs)
          dirs
        }), use.names = FALSE))
        topmost_model_dirs(payload_dirs)
      }
      stage_app_model_root <- function(output_root) {
        staging_root <- "/kflow/work/model-root"
        unlink(staging_root, recursive = TRUE, force = TRUE)
        dir.create(staging_root, recursive = TRUE, showWarnings = FALSE)
        model_dirs <- discover_model_dirs(output_root)
        if (!length(model_dirs)) {
          stop("No model_payload.rds files found for local app under: ", output_root, call. = FALSE)
        }
        for (model_dir in model_dirs) {
          link_or_copy(model_dir, file.path(staging_root, basename(model_dir)))
        }
        region_map_dir <- file.path(output_root, "region-map")
        if (dir.exists(region_map_dir)) {
          link_or_copy(region_map_dir, file.path(staging_root, "region-map"))
        }
        model_index <- file.path(output_root, "model-index.csv")
        if (file.exists(model_index)) {
          file.copy(model_index, file.path(staging_root, "model-index.csv"), overwrite = TRUE, copy.date = TRUE)
        }
        staging_root
      }
      output_root <- discover_output_root(
        Sys.getenv("KFLOW_LOCAL_APP_INPUT_DIR", "/kflow/inputs"),
        Sys.getenv("KFLOW_LOCAL_APP_OUTPUT_DIR", "/kflow/outputs")
      )
      payload_root <- stage_app_model_root(output_root)
      mfclshiny::run_mfclshiny(
        model_dir = payload_root,
        export_dir = "/kflow/work/export",
        report_ready_export = FALSE,
        host = "0.0.0.0",
        port = as.integer(Sys.getenv("PORT", "3838")),
        launch.browser = FALSE
      )
      RS

# Automatic dependency chain:
#   single-area succeeds -> run ofp-sam-bet-2026-results with this job as input
#   results succeeds  -> run the report task from downstream task config
#
# One-off command-line override:
#   make kflow TRIGGER_NEXT=false STEP_SELECT=BET
triggers:
  on_success:
    - key: results-from-single-area
      report: ofp-sam-bet-2026-results
      input_jobs:
        - "{{ job.job_number }}"
      env:
        FLOW_GROUP: "{{ job.config.FLOW_GROUP }}"
        JOB_TITLE: BET single-area results
        JOB_KEY: results-single-area
        JOB_DESCRIPTION: Build report-ready figures and tables from the single-area model payload.
        PLOT_TITLE: "{{ job.config.PLOT_TITLE }}"
        PLOT_MAX_FISHERIES: "{{ job.config.PLOT_MAX_FISHERIES }}"
        FLOW_SPECIES: "{{ job.config.FLOW_SPECIES }}"
        FLOW_SPECIES_LABEL: "{{ job.config.FLOW_SPECIES_LABEL }}"
        FLOW_ASSESSMENT_YEAR: "{{ job.config.FLOW_ASSESSMENT_YEAR }}"
        REPORT_QMD: "{{ job.config.REPORT_QMD }}"
        REPORT_FILE_STEM: "{{ job.config.REPORT_FILE_STEM }}"
        KFLOW_REPORT_COMMIT_GENERATED: "{{ job.config.KFLOW_REPORT_COMMIT_GENERATED }}"
        KFLOW_REPORT_PUSH_GENERATED: "{{ job.config.KFLOW_REPORT_PUSH_GENERATED }}"
        KFLOW_REPORT_PUBLISH_REQUIRED: "{{ job.config.KFLOW_REPORT_PUBLISH_REQUIRED }}"
        KFLOW_RUNTIME_REQUIRE_PRIVATE_PACKAGES: "true"
        KFLOW_RUNTIME_UPDATE: always
        TUNA_FLOW_RUNTIME_UPDATE: always
        KFLOW_REPO_RUNTIME_UPDATE: always
        KFLOW_RUNTIME_PACKAGES: none
        KFLOW_REPO_RUNTIME_PACKAGES: mfclkit=PacificCommunity/ofp-sam-mfclkit@a093e40c0da6984e6f1c3d901e02846a5ee157f1,mfclshiny=PacificCommunity/mfclshiny@90acece572b41061cf3756bf2b2596eb2f1a43fa
        MFCLSHINY_GITHUB_REF: 90acece572b41061cf3756bf2b2596eb2f1a43fa
        MFCLSHINY_REPORT_DPI: "180"
        MFCLSHINY_OPTIMIZE_FIGURES: "false"
        PLOT_OPTIMIZE_FIGURES: "true"
        PLOT_OPTIMIZE_MODE: lossy
        PLOT_PNGQUANT_QUALITY: "60-85"
        PLOT_WEBP_FIGURES: "true"
        PLOT_WEBP_QUALITY: "72"
        PLOT_PDF_JPEG_FIGURES: "true"
        PLOT_JPEG_QUALITY: "82"
        PLOT_JPEG_SAMPLING_FACTOR: "4:2:0"
        KFLOW_RUNTIME_GITHUB_AUTH: "true"
        KFLOW_FORWARD_GITHUB_TOKEN_TO_RUNTIME: "true"
      tags:
        auto: "true"
        stage: results

